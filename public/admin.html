<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Anniversary Messages & RSVP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">
  <main class="admin-wrap">
    <section class="admin-login">
      <h1>Anniversary Admin Dashboard</h1>
      <p>Enter your admin password to view felicitations and RSVP attendance responses.</p>
      <div class="admin-row">
        <input id="adminPassword" type="password" placeholder="Admin password" />
        <button id="loadDashboard" class="primary-btn">View Dashboard</button>
      </div>
      <p id="adminStatus" class="status"></p>
    </section>

    <section class="messages-toolbar">
      <h2 id="messageCount">Messages</h2>
      <h2 id="rsvpCount">RSVPs</h2>
      <button id="printMessages" class="secondary-btn">Print / Save as PDF</button>
    </section>

    <section class="admin-grid">
      <div>
        <h2>Felicitations</h2>
        <section id="messagesList" class="messages-list"></section>
      </div>
      <div>
        <h2>Attendance RSVP</h2>
        <section id="rsvpList" class="messages-list"></section>
      </div>
    </section>
  </main>
  <script src="admin.js"></script>
</body>
</html>
